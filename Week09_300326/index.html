<!DOCTYPE html>
<html ng-app="myApp">
<head>
    <title>AngularJS Modern UI</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 10px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .output {
            margin-top: 20px;
            font-size: 18px;
            color: #444;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body ng-controller="myController">

    <div class="card">
        <h2>👋 Welcome</h2>

        <p>Enter your name:</p>

        <input type="text" ng-model="name" placeholder="Your name">

        <br>

        <button ng-click="showMessage()">Greet Me</button>

        <div class="output">
            {{message}}
        </div>
    </div>

    <script>
        var app = angular.module("myApp", []);

        app.controller("myController", function($scope) {
            $scope.name = "";
            $scope.message = "Your greeting will appear here ✨";

            $scope.showMessage = function() {
                if ($scope.name) {
                    $scope.message = "Hello " + $scope.name + " 😄 Welcome to AngularJS!";
                } else {
                    $scope.message = "Please enter your name first!";
                }
            };
        });
    </script>

</body>
</html>
