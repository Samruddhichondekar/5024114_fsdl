<!DOCTYPE html>
<html>
<head>
    <title>Notes Manager</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f0f0f0;
        }

        .box {
            background: white;
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 15px;
        }

        input {
            width: 70%;
            padding: 8px;
        }

        button {
            padding: 8px;
            margin: 5px;
            cursor: pointer;
        }

        li {
            list-style: none;
            margin: 5px;
            padding: 8px;
            background: #ddd;
            display: flex;
            justify-content: space-between;
        }

        .important {
            background: #ffcccb;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Notes Manager</h2>

    <input id="note" placeholder="Enter note">
    <button onclick="addNote()">Add</button>

    <ul id="list"></ul>
</div>

<script>
function addNote() {
    const text = document.getElementById('note').value;

    if (!text) {
        alert("Enter note!");
        return;
    }

    fetch('/add-note', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.text())
    .then(() => {
        document.getElementById('note').value = "";
        loadNotes();
    });
}

function loadNotes() {
    fetch('/notes')
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById('list');
        list.innerHTML = "";

        data.forEach((n, index) => {
            const li = document.createElement('li');
            li.className = n.important ? "important" : "";

            li.innerHTML = `
                <span onclick="toggleNote(${index})">
                    ${n.text}<br>
                    <small>${n.time}</small>
                </span>
                <button onclick="deleteNote(${index})">❌</button>
            `;
            list.appendChild(li);
        });
    });
}

function deleteNote(index) {
    fetch('/delete-note', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ index: index })
    })
    .then(() => loadNotes());
}

function toggleNote(index) {
    fetch('/toggle-note', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ index: index })
    })
    .then(() => loadNotes());
}

// Load on start
loadNotes();
</script>

</body>
</html>
